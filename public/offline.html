<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Imani — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ecfdf5, #d1fae5);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 320px;
    }
    .emoji { font-size: 4rem; margin-bottom: 1.5rem; }
    h1 { font-size: 1.5rem; font-weight: 700; color: #1e293b; margin-bottom: 0.5rem; }
    p { color: #64748b; font-size: 0.875rem; line-height: 1.6; margin-bottom: 1.5rem; }
    .arabic { font-size: 1.2rem; color: #065f46; margin-bottom: 0.5rem; direction: rtl; }
    .latin { font-size: 0.75rem; color: #6b7280; font-style: italic; margin-bottom: 1.5rem; }
    button {
      background: #059669;
      color: white;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 0.75rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="emoji">🌙</div>
    <p class="arabic">إِنَّ مَعَ الْعُسْرِ يُسْرًا</p>
    <p class="latin">"Sesungguhnya bersama kesulitan ada kemudahan." (QS. Al-Insyirah: 6)</p>
    <h1>Sedang Offline</h1>
    <p>Kamu tidak terhubung ke internet saat ini. Beberapa fitur mungkin tidak tersedia, tapi kamu masih bisa melihat data yang tersimpan.</p>
    <button onclick="window.location.reload()">🔄 Coba Lagi</button>
  </div>
</body>
</html>
